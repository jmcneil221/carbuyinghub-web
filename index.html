<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car Buying Hub - Coming Soon</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      
      /* This places your logo in the background */
      background-image: url('redgoldblack logo.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-color: #111; 
    }

    .container {
      padding: 40px;
      /* This makes the white box slightly see-through! */
      background: rgba(255, 255, 255, 0.85); 
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      max-width: 500px;
      margin: 20px;
    }

    h1 { color: #0056b3; margin-bottom: 10px; font-size: 2.2em; }
    p { font-size: 1.1em; color: #333; line-height: 1.6; font-weight: 500; }

    .badge {
      display: inline-block;
      background-color: #0056b3;
      color: white;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.85em;
      font-weight: bold;
      margin-bottom: 15px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">In Development</div>
    <h1>Car Buying Hub</h1>
    <p>We are currently building something amazing. Check back soon for the ultimate car buying experience!</p>
  </div>
</body>
</html>
